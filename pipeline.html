<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>ELEVATE Pipeline | Widget Tracker</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="css/styles.css" rel="stylesheet"/>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <!-- SortableJS -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f7f9fb",
            "surface-container": "#eceef0",
            "inverse-surface": "#2d3133",
            "primary": "#001e40",
            "secondary-container": "#d5e3fc",
            "on-primary": "#ffffff",
            "inverse-primary": "#a7c8ff",
            "secondary-fixed-dim": "#b9c7df",
            "on-tertiary": "#ffffff",
            "on-primary-fixed": "#001b3c",
            "on-secondary-fixed-variant": "#3a485b",
            "tertiary-container": "#003c27",
            "surface-tint": "#3a5f94",
            "on-secondary-fixed": "#0d1c2e",
            "outline": "#737780",
            "on-secondary": "#ffffff",
            "surface-variant": "#e0e3e5",
            "tertiary": "#002416",
            "error": "#ba1a1a",
            "inverse-on-surface": "#eff1f3",
            "on-surface-variant": "#43474f",
            "tertiary-fixed": "#6ffbbe",
            "surface-dim": "#d8dadc",
            "primary-container": "#003366",
            "on-tertiary-fixed": "#002113",
            "on-secondary-container": "#57657a",
            "on-primary-container": "#799dd6",
            "outline-variant": "#c3c6d1",
            "secondary": "#515f74",
            "error-container": "#ffdad6",
            "primary-fixed-dim": "#a7c8ff",
            "on-surface": "#191c1e",
            "primary-fixed": "#d5e3ff",
            "on-background": "#191c1e",
            "surface-container-highest": "#e0e3e5",
            "on-primary-fixed-variant": "#1f477b",
            "tertiary-fixed-dim": "#4edea3",
            "surface-container-high": "#e6e8ea",
            "on-tertiary-container": "#00b27b",
            "surface-bright": "#f7f9fb",
            "on-error": "#ffffff",
            "secondary-fixed": "#d5e3fc",
            "on-tertiary-fixed-variant": "#005236",
            "on-error-container": "#93000a",
            "surface-container-low": "#f2f4f6",
            "surface-container-lowest": "#ffffff",
            "background": "#f7f9fb"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-secondary-container">
  <script src="js/auth.js"></script>

  <!-- TopAppBar -->
  <header class="bg-surface sticky top-0 z-50">
    <div class="flex justify-between items-center w-full px-6 py-4 max-w-full">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-2xl">analytics</span>
        <h1 class="text-xl font-bold tracking-tight text-primary font-headline">ELEVATE Pipeline</h1>
      </div>
      <div class="flex items-center gap-4">
        <nav class="hidden md:flex gap-6">
          <a class="text-slate-500 font-label text-xs tracking-wider uppercase" href="dashboard.html">Dashboard</a>
          <a class="text-primary font-semibold font-label text-xs tracking-wider uppercase" href="pipeline.html">Pipeline</a>
          <a class="text-slate-500 font-label text-xs tracking-wider uppercase" href="#">Settings</a>
        </nav>
        <button onclick="logout()" title="Sign out" class="flex items-center gap-2 hover:opacity-70 transition-opacity">
          <span id="user-display" class="font-label text-xs text-on-surface-variant"></span>
          <div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border border-outline-variant/15">
            <span class="material-symbols-outlined text-on-surface-variant">person</span>
          </div>
        </button>
        <script>document.getElementById("user-display").textContent = getCurrentUser();</script>
      </div>
    </div>
  </header>

  <main class="pb-24 pt-4">
    <!-- Page Title + Filter Bar -->
    <div class="px-6 mb-6">
      <div class="flex flex-col gap-1 mb-4">
        <span class="font-label text-xs tracking-widest uppercase text-on-surface-variant/70">Operational Overview</span>
        <h2 class="font-headline font-bold text-3xl text-primary tracking-tight">Widget Pipeline Board</h2>
      </div>
      <!-- Filters -->
      <div class="flex gap-2 flex-wrap">
        <button class="filter-btn active px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-wider border border-outline-variant/20" data-filter="all">All</button>
        <button class="filter-btn px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-wider border border-outline-variant/20 text-on-surface-variant bg-surface-container-lowest" data-filter="Tier 1">Tier 1</button>
        <button class="filter-btn px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-wider border border-outline-variant/20 text-on-surface-variant bg-surface-container-lowest" data-filter="Tier 2">Tier 2</button>
        <span class="w-px h-6 bg-outline-variant/20 self-center"></span>
        <button class="filter-btn px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-wider border border-outline-variant/20 text-on-surface-variant bg-surface-container-lowest" data-filter="blocked">Blocked</button>
      </div>
    </div>

    <!-- Kanban Board -->
    <div id="kanban-board" class="kanban-board px-6 pb-6">
      <!-- Columns rendered by JS -->
    </div>
  </main>

  <!-- BottomNavBar -->
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe h-16 bg-white/80 backdrop-blur-md shadow-[0_-4px_12px_rgba(0,30,64,0.04)] border-t border-outline-variant/15">
    <a href="dashboard.html" class="flex flex-col items-center justify-center text-slate-400 hover:text-surface-tint transition-colors">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="font-body text-[10px] font-medium tracking-normal mt-1">Dashboard</span>
    </a>
    <a href="pipeline.html" class="flex flex-col items-center justify-center text-primary font-bold">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">view_kanban</span>
      <span class="font-body text-[10px] font-bold tracking-normal mt-1">Pipeline</span>
    </a>
    <a href="#" class="flex flex-col items-center justify-center text-slate-400 hover:text-surface-tint transition-colors">
      <span class="material-symbols-outlined">database</span>
      <span class="font-body text-[10px] font-medium tracking-normal mt-1">Registry</span>
    </a>
    <a href="#" class="flex flex-col items-center justify-center text-slate-400 hover:text-surface-tint transition-colors">
      <span class="material-symbols-outlined">settings</span>
      <span class="font-body text-[10px] font-medium tracking-normal mt-1">Settings</span>
    </a>
  </nav>

  <!-- Widget Detail Modal -->
  <div id="widget-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/30 backdrop-blur-sm">
    <div id="modal-content" class="bg-surface-container-lowest rounded-2xl shadow-xl border border-outline-variant/10 w-full max-w-md mx-4 p-6 max-h-[80vh] overflow-y-auto">
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/pipeline.js"></script>
</body>
</html>
